[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    slow: marks slow tests
    integration: marks integration tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
python_files = test_*.py
python_classes = Test*
python_functions = test_*
